repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(app/|tests/)
      - id: ruff-format
        files: ^(app/|tests/)

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/
        language: system
        pass_filenames: false
        always_run: true

      - id: ty
        name: ty check
        entry: ty check
        language: system
        types: [python]
        files: ^(app/|tests/)
        pass_filenames: false
